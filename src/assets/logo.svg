<svg width="200" height="63" viewBox="0 0 320 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00B140;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00FF6A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFB800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon box -->
  <rect x="12" y="12" width="76" height="76" rx="10" fill="none" stroke="url(#greenGrad)" stroke-width="1.5"/>

  <!-- Bars -->
  <rect x="24" y="62" width="10" height="20" rx="2" fill="url(#greenGrad)" opacity="0.9"/>
  <rect x="38" y="50" width="10" height="32" rx="2" fill="url(#greenGrad)"/>
  <rect x="52" y="38" width="10" height="44" rx="2" fill="url(#goldGrad)"/>
  <rect x="66" y="28" width="10" height="54" rx="2" fill="url(#greenGrad)"/>

  <!-- Trend line -->
  <polyline points="24,68 38,56 52,42 76,30" fill="none" stroke="#FFB800" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow -->
  <polygon points="76,30 68,29 71,36" fill="#FFB800"/>

  <!-- Baseline -->
  <line x1="18" y1="82" x2="84" y2="82" stroke="#aaa" stroke-width="1"/>

  <!-- ₦ accent -->
  <text x="74" y="24" font-family="Georgia, serif" font-size="9" fill="#FFB800" font-weight="700">₦</text>

  <!-- Wordmark -->
  <text x="100" y="52" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700" font-style="italic" fill="#22c55e" filter="url(#glow)" letter-spacing="-0.5">Naija</text>
  <text x="100" y="74" font-family="'Courier New', monospace" font-size="20" font-weight="400" fill="#F0EDE6" letter-spacing="4">METRICS</text>

  <!-- Underline -->
  <rect x="100" y="56" width="112" height="2" rx="1" fill="url(#goldGrad)" opacity="0.7"/>
</svg>